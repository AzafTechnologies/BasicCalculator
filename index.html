<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azaf's Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div class="calculator-frame">
        <div id="display-label"></div>

        <div class="buttons-container">
            <button class="btn special-btn function-pow2" onclick="pressSquare()">x<sup>2</sup></button>
            <button class="btn special-btn function-pow3" onclick="pressCube()">x<sup>3</sup></button>
            <button class="btn special-btn" onclick="setOperator('modulas')">%</button>
            
            <button class="btn op-btn" onclick="setOperator('divi')">/</button>

            <button class="btn num-btn" onclick="pressNumber('7')">7</button>
            <button class="btn num-btn" onclick="pressNumber('8')">8</button>
            <button class="btn num-btn" onclick="pressNumber('9')">9</button>
            <button class="btn op-btn" onclick="setOperator('multi')">x</button>

            <button class="btn num-btn" onclick="pressNumber('4')">4</button>
            <button class="btn num-btn" onclick="pressNumber('5')">5</button>
            <button class="btn num-btn" onclick="pressNumber('6')">6</button>
            <button class="btn op-btn" onclick="setOperator('sub')">-</button>

            <button class="btn num-btn" onclick="pressNumber('1')">1</button>
            <button class="btn num-btn" onclick="pressNumber('2')">2</button>
            <button class="btn num-btn" onclick="pressNumber('3')">3</button>
            <button class="btn op-btn" onclick="setOperator('add')">+</button>

            <button class="btn num-btn" onclick="pressNumber('.')">.</button>
            <button class="btn num-btn" onclick="pressNumber('0')">0</button>
            
            <button class="btn equal-btn" onclick="pressEqual()">=</button>
            
            <button class="btn clear-btn" onclick="pressClear()">Clear</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
